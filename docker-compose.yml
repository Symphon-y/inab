version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://inab:inab_dev@db:5432/inab_dev
      # Enable polling for file watching (required for Windows/Docker)
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inab-network
    # Keep container running and allow graceful shutdown
    stdin_open: true
    tty: true

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=inab
      - POSTGRES_PASSWORD=inab_dev
      - POSTGRES_DB=inab_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inab -d inab_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inab-network

volumes:
  postgres_data:

networks:
  inab-network:
    driver: bridge
